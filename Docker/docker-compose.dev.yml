# Development infrastructure (hybrid mode)
# Docker: pgvector + qdrant + nginx (optional cloudflared profile)
# Local:  FastAPI + Vite for fast iteration

services:
  # PostgreSQL (PGvector)
  pgvector:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: fehres-pgvector
    ulimits:
      core: 0
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "5434:5432"
    volumes:
      - "${PGVECTOR_DEV_DATA_DIR:-/srv/mergerfs/2TB/fehres_db_dev}:/var/lib/postgresql/data"
    env_file:
      - ./env/.env.postgres
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Qdrant (Vector DB)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fehres-qdrant
    ulimits:
      core: 0
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - "${QDRANT_DEV_DATA_DIR:-/srv/mergerfs/2TB/fehres_qdrant_dev}:/qdrant/storage"
    networks:
      - backend
    restart: unless-stopped

  # Nginx reverse proxy for hybrid mode
  nginx:
    image: nginx:latest
    container_name: fehres-nginx-dev
    ports:
      - "8888:80"
    volumes:
      - ./Nginx/Default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - pgvector
      - qdrant
    networks:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: fehres-cloudflared-dev
    command: tunnel --no-autoupdate run --token $${TUNNEL_TOKEN}
    env_file:
      - ./env/.env.cloudflared
    depends_on:
      - nginx
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - tunnel

networks:
  backend:
    driver: bridge

volumes:
  pgvector:
  qdrant_data:
